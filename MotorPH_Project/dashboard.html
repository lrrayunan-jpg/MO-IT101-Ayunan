<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MotorPH Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Orbitron', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #1f1f1f, #2c2c2c);
  color: white;
}

/* Navbar */
.navbar {
  display:flex;
  justify-content: space-between;
  padding:15px 25px;
  background:black;
}

button {
  background:#e74c3c;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

button:hover {opacity:0.85}

/* Header */
header {
  text-align:center;
  padding:60px 20px;
  background:#e74c3c;
}

/* Section */
.section {
  padding:50px 20px;
  max-width:1000px;
  margin:auto;
}

/* Cards */
.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card {
  background:white;
  color:black;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-6px);
}

.card img {
  width:100%;
  height:160px;
  object-fit:cover;
}

.info {
  padding:12px;
}

.price {
  color:#e74c3c;
  font-weight:bold;
}

.status {
  font-size:12px;
  margin-top:5px;
}

.available {color:green;}
.booked {color:red;}

/* Booking Form */
.form {
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
}

input, select {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

/* Admin list */
li {
  background:white;
  color:black;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="navbar">
  <h3>MotorPH</h3>
  <button onclick="logout()">Logout</button>
</div>

<header>
  <h1 id="welcomeText">Welcome</h1>
</header>

<!-- INVENTORY -->
<div class="section" id="inventory">
  <h2>Inventory</h2>
  <div id="inventoryList"></div>
</div>

<!-- ADMIN BOOKINGS -->
<div class="section" id="adminBookings" style="display:none;">
  <h2>Bookings</h2>
  <ul id="bookingList"></ul>
</div>

<!-- GALLERY -->
<div class="section" id="gallery" style="display:none;">
  <h2>Choose Your Motorcycle</h2>
  <div class="grid" id="galleryList"></div>
</div>

<!-- BOOKING -->
<div class="section" id="booking" style="display:none;">
  <div class="form">
    <h2>Book Now</h2>

    <input type="text" id="customerName" placeholder="Your Name">
    <select id="bikeSelect"></select>
    <input type="date" id="bookingDate">

    <button onclick="addBooking()">Confirm Booking</button>
  </div>
</div>

<script>
// DATA
let motorcycles = [
  {name:"Honda Click 125",price:70000,img:"bike1.jpg",status:"Available"},
  {name:"Honda Wave 110i",price:60000,img:"bike2.png",status:"Available"},
  {name:"Yamaha Mio 115",price:65000,img:"bike3.jpg",status:"Available"},
  {name:"Yamaha NMax 155",price:120000,img:"bike4.png",status:"Available"},
  {name:"Suzuki Raider 150",price:90000,img:"bike5.jpg",status:"Available"},
  {name:"Suzuki Smash 110",price:55000,img:"bike6.jpg",status:"Available"}
];

// ROLE
const role = localStorage.getItem("role");
if(!role){ window.location.href="login.html"; }

// LOAD
window.onload = function(){
  loadBookings();
  updateStatus();
  loadInventory();
  loadGallery();
  loadDropdown();

  if(role==="admin"){
    document.getElementById("welcomeText").innerText="Welcome Admin";
    document.getElementById("adminBookings").style.display="block";
  }

  if(role==="customer"){
    document.getElementById("welcomeText").innerText="Welcome Customer";
    document.getElementById("inventory").style.display="none";
    document.getElementById("adminBookings").style.display="none";
    document.getElementById("gallery").style.display="block";
    document.getElementById("booking").style.display="block";
  }
};

// STATUS UPDATE
function updateStatus(){
  let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

  motorcycles.forEach(bike=>{
    bike.status="Available";
    bookings.forEach(b=>{
      if(b.bike===bike.name){ bike.status="Booked"; }
    });
  });
}

// INVENTORY
function loadInventory(){
  let html="";
  motorcycles.forEach(b=>{
    html+=`<p>${b.name} - ₱${b.price.toLocaleString()} (${b.status})</p>`;
  });
  document.getElementById("inventoryList").innerHTML=html;
}

// GALLERY
function loadGallery(){
  let html="";
  motorcycles.forEach(b=>{
    html+=`
    <div class="card" onclick="selectBike('${b.name}')">
      <img src="${b.img}">
      <div class="info">
        <div>${b.name}</div>
        <div class="price">₱${b.price.toLocaleString()}</div>
        <div class="status ${b.status==="Available"?"available":"booked"}">${b.status}</div>
      </div>
    </div>`;
  });
  document.getElementById("galleryList").innerHTML=html;
}

// DROPDOWN
function loadDropdown(){
  let html="";
  motorcycles.forEach(b=>{
    html+=`<option ${b.status==="Booked"?"disabled":""}>
      ${b.name} - ₱${b.price.toLocaleString()}
    </option>`;
  });
  document.getElementById("bikeSelect").innerHTML=html;
}

// SELECT
function selectBike(bike){
  document.getElementById("bikeSelect").value = bike + " - ₱" + motorcycles.find(b=>b.name===bike).price.toLocaleString();
}

// BOOK
function addBooking(){
  const name=document.getElementById("customerName").value;
  const bike=document.getElementById("bikeSelect").value.split(" - ")[0];
  const date=document.getElementById("bookingDate").value;

  if(!name||!date){alert("Fill all fields");return;}

  let bookings=JSON.parse(localStorage.getItem("bookings"))||[];
  bookings.push({name,bike,date});
  localStorage.setItem("bookings",JSON.stringify(bookings));

  alert("Booked!");
  location.reload();
}

// LOAD BOOKINGS
function loadBookings(){
  let list=document.getElementById("bookingList");
  let bookings=JSON.parse(localStorage.getItem("bookings"))||[];

  list.innerHTML="";
  bookings.forEach((b,i)=>{
    list.innerHTML+=`
      <li>
        ${b.name} - ${b.bike} (${b.date})
        <button onclick="deleteBooking(${i})">X</button>
      </li>`;
  });
}

// DELETE
function deleteBooking(i){
  let bookings=JSON.parse(localStorage.getItem("bookings"));
  bookings.splice(i,1);
  localStorage.setItem("bookings",JSON.stringify(bookings));
  location.reload();
}

// LOGOUT
function logout(){
  localStorage.removeItem("role");
  window.location.href="login.html";
}
</script>

</body>
</html>
